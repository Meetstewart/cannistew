<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stewart — AI Cannabis Operator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      position: absolute;
      top: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-leaf {
      width: 32px;
      height: 32px;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #4caf50;
    }
    .logo-sub {
      font-size: 10px;
      letter-spacing: 1px;
      color: #888;
    }

    /* ── Avatar Ring ── */
    .avatar-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid;
      animation: ring-pulse 2s ease-in-out infinite;
    }
    .ring-1 {
      width: 320px; height: 320px;
      border-color: rgba(76, 175, 80, 0.6);
      animation-delay: 0s;
    }
    .ring-2 {
      width: 290px; height: 290px;
      border-color: rgba(76, 175, 80, 0.4);
      animation-delay: 0.3s;
    }
    .ring-3 {
      width: 260px; height: 260px;
      border-color: rgba(76, 175, 80, 0.2);
      animation-delay: 0.6s;
    }

    @keyframes ring-pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.04); opacity: 1; }
    }

    .ring-1.active, .ring-2.active, .ring-3.active {
      animation: ring-pulse-active 0.6s ease-in-out infinite;
    }
    @keyframes ring-pulse-active {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.7; }
    }

    .avatar-circle {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(76, 175, 80, 0.5);
      position: relative;
      z-index: 10;
    }

    .avatar-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* ── Status ── */
    .status {
      margin-top: 24px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      color: #4caf50;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .status.visible { opacity: 1; }

    /* ── Caption ── */
    .caption {
      margin-top: 16px;
      max-width: 480px;
      text-align: center;
      font-size: 14px;
      color: #aaa;
      line-height: 1.6;
      padding: 0 24px;
      min-height: 40px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 16px;
      margin-top: 32px;
      align-items: center;
    }
    .btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: rgba(255,255,255,0.15); }
    .btn svg { width: 20px; height: 20px; fill: #ccc; }

    .btn-speak {
      width: 64px; height: 64px;
      background: rgba(76, 175, 80, 0.15);
      border-color: rgba(76, 175, 80, 0.5);
    }
    .btn-speak:hover { background: rgba(76, 175, 80, 0.3); }
    .btn-speak svg { fill: #4caf50; width: 26px; height: 26px; }

    /* ── Subtitle ── */
    .subtitle {
      position: absolute;
      bottom: 32px;
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <svg class="logo-leaf" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 2C20 2 4 10 4 22C4 30.8 11.2 38 20 38C28.8 38 36 30.8 36 22C36 10 20 2 20 2Z" fill="#4caf50" opacity="0.9"/>
      <path d="M20 38V18" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
      <path d="M20 26L14 20" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M20 22L26 16" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="logo-text">CANNISTEW</div>
      <div class="logo-sub">AI CANNABIS OPERATOR</div>
    </div>
  </div>

  <!-- Avatar -->
  <div class="avatar-wrapper" id="avatarWrapper">
    <div class="ring ring-1" id="ring1"></div>
    <div class="ring ring-2" id="ring2"></div>
    <div class="ring ring-3" id="ring3"></div>
    <div class="avatar-circle">
      <img id="avatarImg"
           src="https://raw.githubusercontent.com/Meetstewart/cannistew/main/assets/stewart-avatar-v2.png"
           alt="Stewart Avatar"
           onerror="this.style.display='none'; document.getElementById('avatarFallback').style.display='flex'" />
      <div id="avatarFallback" style="display:none; width:100%; height:100%; background:linear-gradient(135deg,#1a3a1a,#0d1f0d); align-items:center; justify-content:center;">
        <svg viewBox="0 0 100 100" width="80" fill="#4caf50">
          <circle cx="50" cy="35" r="20" opacity="0.8"/>
          <ellipse cx="50" cy="80" rx="30" ry="20" opacity="0.6"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="status" id="statusText">SPEAKING</div>

  <!-- Caption -->
  <div class="caption" id="caption">
    Hey, I'm Stewart. Your AI operator for the cannabis industry. How can I help you today?
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="btn" title="Volume">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    </div>
    <div class="btn btn-speak" id="speakBtn" title="Trigger greeting">
      <svg viewBox="0 0 24 24"><path d="M12 15c1.66 0 2.99-1.34 2.99-3L15 6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 15 6.7 12H5c0 3.41 2.72 6.23 6 6.72V21h2v-2.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
    </div>
    <div class="btn" title="Settings">
      <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
    </div>
  </div>

  <!-- Footer -->
  <div class="subtitle">Powered by Stewart AI · cannistew.com</div>

  <script>
    const statusEl = document.getElementById('statusText');
    const captionEl = document.getElementById('caption');
    const rings = [document.getElementById('ring1'), document.getElementById('ring2'), document.getElementById('ring3')];
    const speakBtn = document.getElementById('speakBtn');

    let isSpeaking = false;
    let audioContext = null;

    function setSpeaking(active) {
      isSpeaking = active;
      if (active) {
        statusEl.classList.add('visible');
        rings.forEach(r => r.classList.add('active'));
      } else {
        statusEl.classList.remove('visible');
        rings.forEach(r => r.classList.remove('active'));
      }
    }

    async function triggerGreeting() {
      if (isSpeaking) return;
      setSpeaking(true);
      captionEl.textContent = "Hey, I'm Stewart. Your AI operator for the cannabis industry. How can I help you today?";

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: "Give me a short greeting as Stewart, the AI cannabis operator. Keep it under 2 sentences." })
        });

        if (res.ok) {
          const data = await res.json();
          if (data.audio) {
            // Play base64 audio
            const audioData = atob(data.audio);
            const arrayBuffer = new ArrayBuffer(audioData.length);
            const view = new Uint8Array(arrayBuffer);
            for (let i = 0; i < audioData.length; i++) {
              view[i] = audioData.charCodeAt(i);
            }
            if (!audioContext) audioContext = new AudioContext();
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            const source = audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioContext.destination);
            source.onended = () => setSpeaking(false);
            source.start();
            if (data.text) captionEl.textContent = data.text;
          } else if (data.text) {
            captionEl.textContent = data.text;
            setTimeout(() => setSpeaking(false), 4000);
          } else {
            setTimeout(() => setSpeaking(false), 3000);
          }
        } else {
          setTimeout(() => setSpeaking(false), 3000);
        }
      } catch (e) {
        console.error('Chat error:', e);
        setTimeout(() => setSpeaking(false), 3000);
      }
    }

    speakBtn.addEventListener('click', triggerGreeting);

    // Auto-greet after 2 seconds
    setTimeout(triggerGreeting, 2000);
  </script>

</body>
</html>
