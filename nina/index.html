<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Stewart — AI Cannabis Operator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      position: absolute;
      top: 18px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: 2px; color: #4caf50; }
    .logo-sub  { font-size: 9px; letter-spacing: 1px; color: #555; }

    /* ── Avatar ── */
    .avatar-container {
      position: relative;
      width: 190px;
      height: 252px;
    }

    .ring {
      position: absolute;
      border-radius: 18px;
      border: 2px solid;
      pointer-events: none;
      animation: ring-idle 2.5s ease-in-out infinite;
    }
    .ring-1 { inset: -10px; border-color: rgba(76,175,80,0.4); animation-delay: 0s; }
    .ring-2 { inset: -5px;  border-color: rgba(76,175,80,0.2); animation-delay: 0.45s; }

    @keyframes ring-idle {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.018); }
    }
    .ring.speaking {
      animation: ring-speak 0.5s ease-in-out infinite !important;
    }
    @keyframes ring-speak {
      0%, 100% { opacity: 1;   transform: scale(1);    border-color: rgba(76,175,80,0.95); }
      50%       { opacity: 0.5; transform: scale(1.07); }
    }
    .ring.listening {
      animation: ring-listen 0.8s ease-in-out infinite !important;
      border-color: rgba(255,200,0,0.8) !important;
    }
    @keyframes ring-listen {
      0%, 100% { opacity: 0.8; transform: scale(1);   }
      50%       { opacity: 1;   transform: scale(1.05); }
    }

    .avatar-frame {
      width: 100%; height: 100%;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid rgba(76,175,80,0.35);
      background: linear-gradient(160deg, #1a3a1a, #0d1f0d);
      position: relative; z-index: 10;
    }
    /* Show head + chest so the jacket is visible */
    .avatar-frame img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 5%;
      display: block;
    }

    /* ── Status pill ── */
    .status-pill {
      margin-top: 16px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      opacity: 0; transition: opacity 0.25s;
      min-height: 22px;
    }
    .status-pill.show   { opacity: 1; }
    .status-pill.green  { color: #4caf50; border: 1px solid rgba(76,175,80,0.4); }
    .status-pill.yellow { color: #ffc107; border: 1px solid rgba(255,193,7,0.4); }

    /* ── Transcript ── */
    .transcript {
      margin-top: 8px;
      max-width: 300px; text-align: center;
      font-size: 13px; color: #bbb; line-height: 1.55;
      padding: 0 18px; min-height: 50px;
      transition: opacity 0.3s;
    }
    .transcript.dim { opacity: 0.4; font-style: italic; }

    /* ── CTA button (changes per state) ── */
    .cta-btn {
      margin-top: 26px;
      width: 190px; height: 58px;
      border-radius: 29px;
      border: 2px solid;
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: manipulation;
    }
    .cta-btn:active { transform: scale(0.95); }

    .cta-btn.green-idle {
      background: rgba(76,175,80,0.1);
      border-color: rgba(76,175,80,0.5);
    }
    .cta-btn.green-idle:active { background: rgba(76,175,80,0.25); }

    .cta-btn.yellow-listen {
      background: rgba(255,193,7,0.1);
      border-color: rgba(255,193,7,0.6);
    }
    .cta-btn.yellow-listen:active { background: rgba(255,193,7,0.25); }

    .cta-btn.disabled {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.1);
      cursor: not-allowed;
      opacity: 0.5;
    }

    .cta-icon  { font-size: 22px; line-height: 1; }
    .cta-label { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; }
    .cta-label.green  { color: #4caf50; }
    .cta-label.yellow { color: #ffc107; }
    .cta-label.grey   { color: #555; }

    /* ── Mute ── */
    .mute-btn {
      margin-top: 14px;
      background: none; border: 1px solid #282828;
      border-radius: 20px; padding: 5px 16px;
      font-size: 11px; color: #555; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.18s;
    }
    .mute-btn:active { background: rgba(255,255,255,0.05); }
    .mute-btn.muted  { color: #333; border-color: #1a1a1a; }

    /* ── Restart ── */
    .restart-btn {
      margin-top: 10px;
      background: none; border: none;
      font-size: 11px; color: #333;
      cursor: pointer; letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
    }
    .restart-btn:active { color: #666; }

    .footer {
      position: absolute; bottom: 16px;
      font-size: 9px; color: #2a2a2a; letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <svg width="26" height="26" viewBox="0 0 40 40" fill="none">
      <path d="M20 2C20 2 4 10 4 22C4 30.8 11.2 38 20 38C28.8 38 36 30.8 36 22C36 10 20 2 20 2Z" fill="#4caf50" opacity="0.9"/>
      <path d="M20 38V18" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
      <path d="M20 26L14 20" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M20 22L26 16" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="logo-text">CANNISTEW</div>
      <div class="logo-sub">AI CANNABIS OPERATOR</div>
    </div>
  </div>

  <!-- Avatar -->
  <div class="avatar-container">
    <div class="ring ring-1" id="ring1"></div>
    <div class="ring ring-2" id="ring2"></div>
    <div class="avatar-frame">
      <img src="https://raw.githubusercontent.com/Meetstewart/cannistew/main/assets/stewart-avatar-v2.png"
           alt="Stewart"
           onerror="this.style.display='none'" />
    </div>
  </div>

  <!-- Status -->
  <div class="status-pill green" id="statusPill">SPEAKING</div>

  <!-- Transcript / Caption -->
  <div class="transcript" id="transcript">Initializing Stewart…</div>

  <!-- Main CTA -->
  <div class="cta-btn disabled" id="ctaBtn">
    <span class="cta-icon" id="ctaIcon">⏳</span>
    <span class="cta-label grey" id="ctaLabel">LOADING…</span>
  </div>

  <!-- Mute -->
  <button class="mute-btn" id="muteBtn">🔊 Sound On</button>

  <!-- Restart -->
  <button class="restart-btn" id="restartBtn">↺ restart demo</button>

  <div class="footer">Powered by Stewart AI · cannistew.com</div>

<script>
  /* ── Config ── */
  const EL_KEY   = 'sk_69ca5f0d54a48ca9353f954bd648d474b4ed7238de9ef7bf';
  const VOICE_ID = 'iP95p4xoKVk53GoZ742B';

  /* ── Script ── */
  const INTRO    = "Hi! I'm Stewart — a custom-built AI specializing in helping growers and dispensaries bring automation and AI into their businesses.";
  const QUESTION = "What's your name, and what do you do?";

  function buildResponse(transcript) {
    const lower = transcript.toLowerCase();

    // Try to extract a name
    let name = '';
    const patterns = [
      /(?:i'm|i am|my name is|name's|it's|its|call me)\s+([A-Z][a-z]+)/i,
    ];
    for (const p of patterns) {
      const m = transcript.match(p);
      if (m) { name = m[1]; break; }
    }
    if (!name) {
      const words = transcript.trim().split(/\s+/);
      if (words[0] && words[0].length > 1) name = words[0];
    }

    const isGrower    = /grow|cultivat|farm|plant|harvest|crop|master grower/i.test(lower);
    const isDispensary = /dispensary|retail|store|shop|sell|sales|bud|tender|dispo/i.test(lower);

    let pitch;
    if (isGrower && isDispensary) {
      pitch = "That's great — you're across the whole supply chain! I can help on both sides: automating grow compliance and documentation on the cultivation side, and handling customer intake, product recommendations, and inventory alerts on the retail side. All running 24/7 without extra headcount.";
    } else if (isGrower) {
      pitch = "Perfect — for cultivators, I can automate your environmental monitoring, track compliance documentation, optimize grow cycles, and predict harvest windows based on your operation's data. Less manual work, fewer compliance headaches.";
    } else if (isDispensary) {
      pitch = "Awesome — for dispensaries I handle customer intake, personalized product recommendations, compliance reporting, inventory alerts, and staff training workflows. All automated, all running 24/7 so your team can focus on the floor.";
    } else {
      pitch = "I help cannabis operators automate the repetitive stuff — compliance docs, customer communication, inventory tracking, and staff workflows — so you can focus on what actually moves your business forward.";
    }

    const hi = name ? `${name}, great to meet you! ` : `Great to meet you! `;
    return `${hi}${pitch} Want to see what I can do for your specific operation?`;
  }

  /* ── State machine ── */
  // States: 'loading' | 'speaking_intro' | 'speaking_question' | 'ready_to_listen' | 'listening' | 'speaking_response' | 'done'
  let state        = 'loading';
  let muted        = false;
  let currentAudio = null;
  let recognition  = null;

  const ring1      = document.getElementById('ring1');
  const ring2      = document.getElementById('ring2');
  const statusPill = document.getElementById('statusPill');
  const transcript = document.getElementById('transcript');
  const ctaBtn     = document.getElementById('ctaBtn');
  const ctaIcon    = document.getElementById('ctaIcon');
  const ctaLabel   = document.getElementById('ctaLabel');
  const muteBtn    = document.getElementById('muteBtn');

  function setRings(mode) {
    [ring1, ring2].forEach(r => {
      r.className = 'ring ' + (r === ring1 ? 'ring-1' : 'ring-2') + ' ' + mode;
    });
  }

  function showStatus(text, color) {
    statusPill.textContent  = text;
    statusPill.className    = 'status-pill show ' + color;
  }
  function hideStatus() {
    statusPill.className = 'status-pill';
  }

  function setCTA(mode) {
    ctaBtn.className = 'cta-btn ' + mode;
    if (mode === 'disabled') {
      ctaIcon.textContent = '⏳';
      ctaLabel.textContent = 'LOADING…';
      ctaLabel.className = 'cta-label grey';
    } else if (mode === 'green-idle') {
      ctaIcon.textContent = '🎙️';
      ctaLabel.textContent = 'TAP TO TALK';
      ctaLabel.className = 'cta-label green';
    } else if (mode === 'yellow-listen') {
      ctaIcon.textContent = '👂';
      ctaLabel.textContent = 'LISTENING…';
      ctaLabel.className = 'cta-label yellow';
    }
  }

  async function speak(text) {
    return new Promise(async (resolve) => {
      transcript.textContent = text;
      transcript.classList.remove('dim');
      setRings('speaking');
      showStatus('SPEAKING', 'green');
      setCTA('disabled');

      try {
        const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
          method: 'POST',
          headers: {
            'xi-api-key': EL_KEY,
            'Content-Type': 'application/json',
            'Accept': 'audio/mpeg',
          },
          body: JSON.stringify({
            text,
            model_id: 'eleven_monolingual_v1',
            voice_settings: { stability: 0.5, similarity_boost: 0.75 },
          }),
        });

        if (!res.ok) { console.error('EL error', res.status); setRings(''); hideStatus(); resolve(); return; }

        const buf  = await res.arrayBuffer();
        const blob = new Blob([buf], { type: 'audio/mpeg' });
        const url  = URL.createObjectURL(blob);

        currentAudio = new Audio(url);
        currentAudio.muted = muted;
        currentAudio.onended = () => { URL.revokeObjectURL(url); setRings(''); hideStatus(); resolve(); };
        currentAudio.onerror = () => { URL.revokeObjectURL(url); setRings(''); hideStatus(); resolve(); };
        await currentAudio.play();
      } catch (e) {
        console.error('TTS fail', e);
        setRings(''); hideStatus(); resolve();
      }
    });
  }

  function startListening() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      // Fallback if no speech recognition
      transcript.textContent = "(Speech recognition not supported on this browser — try Chrome or Safari on iOS 17+)";
      transcript.classList.add('dim');
      setCTA('green-idle');
      state = 'ready_to_listen';
      return;
    }

    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    state = 'listening';
    setRings('listening');
    showStatus('LISTENING', 'yellow');
    setCTA('yellow-listen');
    transcript.textContent = 'Go ahead — I\'m listening…';
    transcript.classList.add('dim');

    recognition.onresult = async (e) => {
      const said = e.results[0][0].transcript;
      console.log('Heard:', said);
      transcript.classList.remove('dim');
      transcript.textContent = said;
      setRings('');
      hideStatus();
      setCTA('disabled');

      state = 'speaking_response';
      const response = buildResponse(said);
      await speak(response);
      state = 'done';
      transcript.classList.add('dim');
      transcript.textContent = 'Tap to hear Stewart again';
      setCTA('green-idle');
    };

    recognition.onerror = (e) => {
      console.error('SR error', e.error);
      setRings('');
      hideStatus();
      transcript.textContent = e.error === 'not-allowed'
        ? 'Microphone access denied. Please allow mic and tap again.'
        : 'Didn\'t catch that — tap to try again.';
      transcript.classList.add('dim');
      setCTA('green-idle');
      state = 'ready_to_listen';
    };

    recognition.onend = () => {
      if (state === 'listening') {
        // ended without result
        setRings('');
        hideStatus();
        transcript.textContent = 'Didn\'t catch that — tap to try again.';
        transcript.classList.add('dim');
        setCTA('green-idle');
        state = 'ready_to_listen';
      }
    };

    recognition.start();
  }

  /* ── CTA click ── */
  ctaBtn.addEventListener('click', () => {
    if (state === 'ready_to_listen') {
      startListening();
    } else if (state === 'done') {
      runIntro();
    }
  });

  /* ── Mute ── */
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    if (currentAudio) currentAudio.muted = muted;
    muteBtn.textContent = muted ? '🔇 Muted' : '🔊 Sound On';
    muteBtn.classList.toggle('muted', muted);
  });

  /* ── Restart ── */
  document.getElementById('restartBtn').addEventListener('click', () => {
    if (recognition) { try { recognition.stop(); } catch(e) {} }
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    state = 'loading';
    setRings('');
    hideStatus();
    setCTA('disabled');
    transcript.classList.remove('dim');
    transcript.textContent = 'Restarting…';
    setTimeout(runIntro, 600);
  });

  /* ── Main flow ── */
  async function runIntro() {
    state = 'speaking_intro';
    await speak(INTRO);

    await new Promise(r => setTimeout(r, 600));

    state = 'speaking_question';
    await speak(QUESTION);

    state = 'ready_to_listen';
    transcript.textContent = 'Tap the button and tell me about yourself';
    transcript.classList.add('dim');
    setCTA('green-idle');
  }

  // Kick off after short delay
  setTimeout(runIntro, 1500);
</script>

</body>
</html>
