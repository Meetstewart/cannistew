<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stewart / Nina — AI Demo</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #22c55e;
      --green-dim: #16a34a;
      --green-glow: rgba(34, 197, 94, 0.35);
      --bg: #050a05;
      --surface: #0d160d;
      --surface2: #131f13;
      --border: rgba(34, 197, 94, 0.15);
      --text: #e8f5e8;
      --text-dim: #6b8f6b;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── Layout ────────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 0;
      position: relative;
    }

    /* ── Header wordmark ───────────────────────────────────────────────────── */
    #wordmark {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.9;
    }
    #wordmark .leaf { font-size: 22px; }
    #wordmark .name {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--green);
      text-transform: uppercase;
    }
    #wordmark .sub {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Avatar orb ────────────────────────────────────────────────────────── */
    #avatar-wrap {
      position: relative;
      width: 320px;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    /* Outer glow ring */
    #avatar-ring {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    /* Pulse rings */
    .pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--green);
      opacity: 0;
      transform: scale(1);
    }

    /* Core orb */
    #avatar-orb {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%,
        #1a3a1a 0%,
        #0d1f0d 40%,
        #050a05 100%
      );
      border: 2px solid rgba(34, 197, 94, 0.3);
      box-shadow:
        inset 0 0 60px rgba(34, 197, 94, 0.08),
        0 0 40px rgba(34, 197, 94, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: box-shadow 0.4s ease, border-color 0.4s ease;
      overflow: hidden;
    }

    /* ── State animations ──────────────────────────────────────────────────── */

    /* IDLE — gentle shimmer */
    body.idle #avatar-orb {
      animation: idle-breathe 4s ease-in-out infinite;
    }
    @keyframes idle-breathe {
      0%, 100% { box-shadow: inset 0 0 60px rgba(34,197,94,0.08), 0 0 40px rgba(34,197,94,0.12); }
      50%       { box-shadow: inset 0 0 80px rgba(34,197,94,0.14), 0 0 60px rgba(34,197,94,0.20); }
    }

    /* LISTENING — pulse rings */
    body.listening #avatar-ring { opacity: 1; }
    body.listening #avatar-orb {
      border-color: var(--green);
      box-shadow:
        inset 0 0 80px rgba(34,197,94,0.20),
        0 0 80px rgba(34,197,94,0.30);
      animation: listen-pulse 1.4s ease-in-out infinite;
    }
    @keyframes listen-pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.025); }
    }
    body.listening .pulse-ring:nth-child(1) { animation: ring-expand 1.4s ease-out infinite 0s; }
    body.listening .pulse-ring:nth-child(2) { animation: ring-expand 1.4s ease-out infinite 0.4s; }
    body.listening .pulse-ring:nth-child(3) { animation: ring-expand 1.4s ease-out infinite 0.8s; }
    @keyframes ring-expand {
      0%   { opacity: 0.7; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.55); }
    }

    /* THINKING — slow spinning gradient */
    body.thinking #avatar-orb {
      border-color: var(--warning);
      animation: think-spin 2s linear infinite;
      box-shadow:
        inset 0 0 80px rgba(245,158,11,0.15),
        0 0 60px rgba(245,158,11,0.20);
    }
    @keyframes think-spin {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(30deg); }
    }
    body.thinking #avatar-ring {
      opacity: 0.5;
      background: radial-gradient(circle, rgba(245,158,11,0.25) 0%, transparent 70%);
      animation: think-breathe 1s ease-in-out infinite;
    }
    @keyframes think-breathe {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.7; }
    }

    /* SPEAKING — wave ripple */
    body.speaking #avatar-orb {
      border-color: var(--green);
      box-shadow:
        inset 0 0 100px rgba(34,197,94,0.25),
        0 0 100px rgba(34,197,94,0.35);
      animation: speak-wave 0.6s ease-in-out infinite alternate;
    }
    @keyframes speak-wave {
      0%   { transform: scale(1); }
      100% { transform: scale(1.04); }
    }
    body.speaking #avatar-ring { opacity: 1; }
    body.speaking .pulse-ring:nth-child(1) { animation: ring-expand 0.8s ease-out infinite 0s; }
    body.speaking .pulse-ring:nth-child(2) { animation: ring-expand 0.8s ease-out infinite 0.25s; }
    body.speaking .pulse-ring:nth-child(3) { animation: ring-expand 0.8s ease-out infinite 0.5s; }

    /* ── Status label ──────────────────────────────────────────────────────── */
    #status-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      height: 20px;
      transition: color 0.3s ease;
      margin-bottom: 16px;
    }
    body.listening #status-label { color: var(--green); }
    body.thinking  #status-label { color: var(--warning); }
    body.speaking  #status-label { color: var(--green); }

    /* ── Transcript ────────────────────────────────────────────────────────── */
    #transcript-wrap {
      width: 480px;
      max-width: 90vw;
      min-height: 80px;
      max-height: 160px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 24px;
    }
    .transcript-line {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
      animation: fade-in 0.3s ease;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .transcript-line.user {
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.12);
      color: var(--text);
      align-self: flex-end;
      text-align: right;
    }
    .transcript-line.stewart {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-dim);
      align-self: flex-start;
    }

    /* ── Controls ──────────────────────────────────────────────────────────── */
    #controls {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .ctrl-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:hover { border-color: var(--green); color: var(--green); }
    .ctrl-btn.active { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.1); }
    .ctrl-btn.danger { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.08); }

    /* Main talk button */
    #btn-talk {
      width: 72px;
      height: 72px;
      font-size: 28px;
      border-color: rgba(34,197,94,0.4);
      background: var(--surface2);
    }
    #btn-talk:hover { border-color: var(--green); background: rgba(34,197,94,0.12); }
    #btn-talk.active {
      border-color: var(--green);
      background: rgba(34,197,94,0.18);
      box-shadow: 0 0 30px rgba(34,197,94,0.30);
      color: var(--green);
    }

    /* ── Fallback indicator ────────────────────────────────────────────────── */
    #fallback-badge {
      position: absolute;
      bottom: 24px;
      right: 24px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #fallback-badge.visible { opacity: 1; }
    #fallback-badge .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--warning);
      margin-right: 5px;
      vertical-align: middle;
    }

    /* ── Camera PiP ────────────────────────────────────────────────────────── */
    #camera-pip {
      position: absolute;
      bottom: 24px;
      left: 24px;
      width: 120px;
      height: 90px;
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid var(--border);
      background: #000;
      display: none;
    }
    #camera-pip.visible { display: block; }
    #camera-pip video {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror */
    }

    /* ── Error toast ───────────────────────────────────────────────────────── */
    #toast {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }
    #toast.visible { opacity: 1; }
  
  /* ── Persona selector ─────────────────────────────────────────────────── */
  #persona-wrap {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 100;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(10px);
    border-radius: 999px;
    padding: 6px 10px;
  }
  .persona-btn {
    border: none;
    border-radius: 999px;
    padding: 7px 20px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    background: transparent;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.03em;
  }
  .persona-btn.active {
    background: var(--green);
    color: #000;
  }
  .persona-btn:not(.active):hover {
    color: #fff;
  }

  </style>
</head>

<script>
(function() {
  'use strict';

  // ── Personas ──────────────────────────────────────────────────────────────
  // SECURITY: API key must not be in client-side code. Use a backend proxy.
  // TODO: Implement a backend endpoint to proxy ElevenLabs API calls,
  // and remove this key entirely from client-side code.
  const ELEVENLABS_API_KEY = ''; // REMOVED — credential must not be exposed in client-side code

  const PERSONAS = {
    cannistew: {
      name: 'CanniStew',
      subName: 'by Stewart',
      voiceId: 'eFOBJClK5irrpIcan4HP',  // Stewart voice
      welcome: "Hey, I'm Stewart — your AI operator for the cannabis industry. Tap the mic or press Space to talk.",
      themeColor: '#22c55e',
    },
    nina: {
      name: 'Nina',
      subName: 'AI Demo',
      voiceId: 'cgSgspJ2msm6clMCkdW9',  // Jessica — Playful, Bright, Warm
      welcome: "Hi! I'm Nina, your AI demo assistant. Tap the mic or press Space to talk.",
      themeColor: '#a855f7',
    },
  };

  // ── State ──────────────────────────────────────────────────────────────────
  const STATE = {
    currentPersona: 'cannistew',
    mode: 'idle',        // idle | listening | thinking | speaking
    micActive: false,
    cameraActive: false,
    fallbackForced: false,
    lastFallback: false,
    recognition: null,
    speechSynth: window.speechSynthesis,
    cameraStream: null,
    transcriptLines: [],
    currentAudio: null,
  };

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const body = document.body;
  const statusLabel = document.getElementById('status-label');
  const transcriptWrap = document.getElementById('transcript-wrap');
  const btnTalk = document.getElementById('btn-talk');
  const btnCamera = document.getElementById('btn-camera');
  const btnFallback = document.getElementById('btn-fallback');
  const cameraPip = document.getElementById('camera-pip');
  const cameraVideo = document.getElementById('camera-video');
  const fallbackBadge = document.getElementById('fallback-badge');
  const toast = document.getElementById('toast');
  const mouthIdle = document.getElementById('mouth-idle');
  const mouthSpeak = document.getElementById('mouth-speak');

  // ── Mode transitions ───────────────────────────────────────────────────────
  function setMode(mode) {
    STATE.mode = mode;
    body.className = mode;

    const labels = {
      idle: 'Ready',
      listening: 'Listening…',
      thinking: 'Thinking…',
      speaking: 'Speaking',
    };
    statusLabel.textContent = labels[mode] || mode;

    // Mouth shape
    if (mode === 'speaking') {
      mouthIdle.setAttribute('opacity', '0');
      mouthSpeak.setAttribute('opacity', '1');
    } else {
      mouthIdle.setAttribute('opacity', '1');
      mouthSpeak.setAttribute('opacity', '0');
    }
  }

  // ── Toast ──────────────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg, duration = 3500) {
    toast.textContent = msg;
    toast.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('visible'), duration);
  }

  // ── Transcript ─────────────────────────────────────────────────────────────
  function addTranscriptLine(text, role) {
    // Keep max 3 lines
    if (STATE.transcriptLines.length >= 3) {
      const oldest = STATE.transcriptLines.shift();
      if (oldest && oldest.parentNode) oldest.parentNode.removeChild(oldest);
    }
    const div = document.createElement('div');
    div.className = 'transcript-line ' + role;
    div.textContent = text;
    transcriptWrap.appendChild(div);
    STATE.transcriptLines.push(div);
  }

  // ── Speech synthesis (TTS) — ElevenLabs with Web Speech fallback ─────────
  function speakWebSpeech(text, onEnd) {
    const synth = STATE.speechSynth;
    if (!synth) { onEnd && onEnd(); return; }
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.0;
    utter.pitch = 0.95;
    utter.volume = 1.0;
    const voices = synth.getVoices();
    const preferred = voices.find(v => v.lang.startsWith('en') && v.localService) ||
                      voices.find(v => v.lang.startsWith('en')) || voices[0];
    if (preferred) utter.voice = preferred;
    utter.onend = () => { onEnd && onEnd(); };
    utter.onerror = () => { onEnd && onEnd(); };
    synth.speak(utter);
  }

  async function speak(text, onEnd) {
    const persona = PERSONAS[STATE.currentPersona];
    const voiceId = persona.voiceId;
    try {
      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
        method: 'POST',
        headers: {
          'Accept': 'audio/mpeg',
          'Content-Type': 'application/json',
          'xi-api-key': ELEVENLABS_API_KEY,
        },
        body: JSON.stringify({
          text: text,
          model_id: 'eleven_monolingual_v1',
          voice_settings: { stability: 0.5, similarity_boost: 0.75 },
        }),
      });
      if (!res.ok) throw new Error('ElevenLabs ' + res.status);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.onended = () => { URL.revokeObjectURL(url); onEnd && onEnd(); };
      audio.onerror = () => { URL.revokeObjectURL(url); speakWebSpeech(text, onEnd); };
      STATE.currentAudio = audio;
      await audio.play();
    } catch (err) {
      console.warn('[nina-demo] ElevenLabs TTS error, using Web Speech fallback:', err);
      speakWebSpeech(text, onEnd);
    }
  }

  // ── Backend call ───────────────────────────────────────────────────────────
  async function sendToBackend(text) {
    setMode('thinking');
    addTranscriptLine(text, 'user');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, sessionId: 'nina-demo-' + Date.now() }),
      });
      const data = await res.json();
      const reply = data.reply || "I'm here. What can I do for you?";
      STATE.lastFallback = data.source === 'fallback';
      updateFallbackBadge();
      handleReply(reply);
    } catch (err) {
      console.warn('[nina-demo] fetch error', err);
      STATE.lastFallback = true;
      updateFallbackBadge();
      handleReply("I'm having a little trouble connecting, but I'm here. What can I do for you?");
    }
  }

  function handleReply(text) {
    addTranscriptLine(text, 'stewart');
    setMode('speaking');

    speak(text, () => {
      setMode('idle');
    });
  }

  // ── Speech recognition (STT) ───────────────────────────────────────────────
  function setupRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      showToast('Speech recognition not available in this browser. Try Chrome.');
      return;
    }

    const rec = new SpeechRecognition();
    rec.continuous = false;
    rec.interimResults = false;
    rec.lang = 'en-US';

    rec.onstart = () => {
      STATE.micActive = true;
      setMode('listening');
      btnTalk.classList.add('active');
    };

    rec.onresult = (event) => {
      const transcript = event.results[0][0].transcript.trim();
      if (transcript) {
        sendToBackend(transcript);
      } else {
        setMode('idle');
      }
    };

    rec.onerror = (event) => {
      if (event.error !== 'no-speech') {
        showToast('Mic error: ' + event.error);
      }
      setMode('idle');
      STATE.micActive = false;
      btnTalk.classList.remove('active');
    };

    rec.onend = () => {
      STATE.micActive = false;
      btnTalk.classList.remove('active');
      if (STATE.mode === 'listening') setMode('idle');
    };

    STATE.recognition = rec;
  }

  function startListening() {
    if (STATE.mode === 'speaking') {
      STATE.speechSynth && STATE.speechSynth.cancel();
      if (STATE.currentAudio) { STATE.currentAudio.pause(); STATE.currentAudio = null; }
    }
    if (STATE.recognition) {
      try { STATE.recognition.start(); }
      catch(e) { /* already started */ }
    }
  }

  // ── Camera ─────────────────────────────────────────────────────────────────
  async function toggleCamera() {
    if (STATE.cameraActive) {
      if (STATE.cameraStream) {
        STATE.cameraStream.getTracks().forEach(t => t.stop());
        STATE.cameraStream = null;
      }
      cameraVideo.srcObject = null;
      cameraPip.classList.remove('visible');
      btnCamera.classList.remove('active');
      STATE.cameraActive = false;
    } else {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        STATE.cameraStream = stream;
        cameraVideo.srcObject = stream;
        cameraPip.classList.add('visible');
        btnCamera.classList.add('active');
        STATE.cameraActive = true;
      } catch(e) {
        showToast('Camera permission denied');
      }
    }
  }

  // ── Fallback badge ─────────────────────────────────────────────────────────
  function updateFallbackBadge() {
    const show = STATE.fallbackForced || STATE.lastFallback;
    if (show) fallbackBadge.classList.add('visible');
    else fallbackBadge.classList.remove('visible');
  }

  // ── Button bindings ────────────────────────────────────────────────────────
  // Talk button — tap to trigger one-shot listen
  btnTalk.addEventListener('click', () => {
    if (STATE.mode === 'thinking') return; // busy
    startListening();
  });

  // Camera toggle
  btnCamera.addEventListener('click', toggleCamera);

  // Fallback mode toggle (for operators)
  btnFallback.addEventListener('click', () => {
    STATE.fallbackForced = !STATE.fallbackForced;
    if (STATE.fallbackForced) {
      btnFallback.classList.add('active');
      showToast('Offline / fallback mode ON');
    } else {
      btnFallback.classList.remove('active');
      showToast('Live mode ON — connecting to Stewart');
    }
    updateFallbackBadge();
  });

  // ── Keyboard shortcut — spacebar to talk ─────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      if (STATE.mode !== 'thinking') startListening();
    }
  });

  // ── Persona switch ─────────────────────────────────────────────────────────
  function switchPersona(key) {
    if (!PERSONAS[key]) return;
    STATE.currentPersona = key;
    const persona = PERSONAS[key];
    // Update name labels
    const nameEl = document.getElementById('persona-name');
    const subEl = document.getElementById('persona-sub');
    if (nameEl) nameEl.textContent = persona.name;
    if (subEl) subEl.textContent = persona.subName;
    // Update button states
    document.querySelectorAll('.persona-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.persona === key);
    });
    // Update theme color
    document.documentElement.style.setProperty('--green', persona.themeColor);
    showToast('Switched to ' + persona.name);
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  function init() {
    setupRecognition();
    setMode('idle');

    // Persona buttons
    document.querySelectorAll('.persona-btn').forEach(btn => {
      btn.addEventListener('click', () => switchPersona(btn.dataset.persona));
    });

    // Trigger a welcome TTS on load after short delay
    setTimeout(() => {
      const welcome = PERSONAS[STATE.currentPersona].welcome;
      handleReply(welcome);
    }, 800);
  }

  // Wait for voices to load
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => {};
  }

  window.addEventListener('DOMContentLoaded', init);
  // Also run if already loaded
  if (document.readyState !== 'loading') init();

})();
</script>

</body>
</html>
