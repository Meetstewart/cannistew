<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CanniStew — Talk to Stewart &amp; Nina</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #22c55e;
      --accent-dim: #16a34a;
      --accent-glow: rgba(34, 197, 94, 0.35);
      --bg: #050a05;
      --surface: #0d160d;
      --border: rgba(34, 197, 94, 0.18);
      --text: #e8f5e8;
      --text-dim: #6b8f6b;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      position: relative;
      padding: 20px;
    }

    /* ── Persona toggle ────────────────────────────────────────────── */
    #persona-bar {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      overflow: hidden;
      z-index: 10;
    }
    .persona-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 15px;
      font-weight: 600;
      padding: 10px 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.03em;
    }
    .persona-btn.active {
      background: var(--accent);
      color: #000;
      border-radius: 50px;
    }
    .persona-btn:not(.active):hover {
      color: var(--text);
    }

    /* ── Avatar orb ────────────────────────────────────────────────── */
    #avatar-container {
      position: relative;
      width: 300px;
      height: 300px;
      margin-bottom: 24px;
    }

    #avatar-ring {
      position: absolute;
      inset: -24px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      opacity: 0;
      transform: scale(1);
      pointer-events: none;
    }

    #avatar-orb {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 38% 35%, #1a3a1a 0%, #0d1f0d 40%, #050a05 100%);
      border: 2.5px solid rgba(34, 197, 94, 0.3);
      box-shadow: inset 0 0 60px rgba(34, 197, 94, 0.08), 0 0 40px rgba(34, 197, 94, 0.12);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.4s ease, border-color 0.4s ease, transform 0.3s ease;
    }

    #avatar-img {
      width: 110%;
      height: 110%;
      object-fit: cover;
      border-radius: 50%;
      transition: opacity 0.4s ease, transform 0.3s ease;
    }

    /* ── State: IDLE ───────────────────────────────────────────────── */
    body.idle #avatar-orb {
      animation: idle-breathe 4s ease-in-out infinite;
    }
    @keyframes idle-breathe {
      0%, 100% { box-shadow: inset 0 0 60px rgba(34,197,94,0.08), 0 0 40px rgba(34,197,94,0.12); }
      50%       { box-shadow: inset 0 0 80px rgba(34,197,94,0.14), 0 0 60px rgba(34,197,94,0.22); }
    }

    /* ── State: LISTENING ──────────────────────────────────────────── */
    body.listening #avatar-ring { opacity: 1; }
    body.listening #avatar-orb {
      border-color: var(--accent);
      box-shadow: inset 0 0 80px rgba(34,197,94,0.20), 0 0 80px rgba(34,197,94,0.35);
      animation: listen-scale 1.2s ease-in-out infinite;
    }
    @keyframes listen-scale {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%       { transform: translate(-50%, -50%) scale(1.04); }
    }
    body.listening .pulse-ring:nth-child(2) { animation: ring-expand 1.6s ease-out infinite 0s; }
    body.listening .pulse-ring:nth-child(3) { animation: ring-expand 1.6s ease-out infinite 0.5s; }
    body.listening .pulse-ring:nth-child(4) { animation: ring-expand 1.6s ease-out infinite 1.0s; }
    @keyframes ring-expand {
      0%   { opacity: 0.6; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.6); }
    }

    /* ── State: THINKING ───────────────────────────────────────────── */
    body.thinking #avatar-orb {
      border-color: var(--warning);
      box-shadow: inset 0 0 80px rgba(245,158,11,0.15), 0 0 60px rgba(245,158,11,0.22);
      animation: think-pulse 2s ease-in-out infinite;
    }
    body.thinking #avatar-ring {
      opacity: 0.6;
      background: radial-gradient(circle, rgba(245,158,11,0.25) 0%, transparent 70%);
    }
    @keyframes think-pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); border-color: rgba(245,158,11,0.3); }
      50%       { transform: translate(-50%, -50%) scale(1.02); border-color: rgba(245,158,11,0.6); }
    }

    /* ── State: SPEAKING ───────────────────────────────────────────── */
    body.speaking #avatar-ring { opacity: 1; }
    body.speaking #avatar-orb {
      border-color: var(--accent);
      box-shadow: inset 0 0 100px rgba(34,197,94,0.25), 0 0 100px rgba(34,197,94,0.40);
      animation: speak-bounce 0.6s ease-in-out infinite;
    }
    @keyframes speak-bounce {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      15%      { transform: translate(-50%, -50%) scale(1.04) translateY(-2px); }
      35%      { transform: translate(-50%, -50%) scale(0.97); }
      55%      { transform: translate(-50%, -50%) scale(1.03) translateY(-1px); }
      75%      { transform: translate(-50%, -50%) scale(0.99); }
    }
    body.speaking .pulse-ring:nth-child(2) { animation: ring-expand 0.9s ease-out infinite 0s; }
    body.speaking .pulse-ring:nth-child(3) { animation: ring-expand 0.9s ease-out infinite 0.3s; }
    body.speaking .pulse-ring:nth-child(4) { animation: ring-expand 0.9s ease-out infinite 0.6s; }

    /* ── Status label ──────────────────────────────────────────────── */
    #status {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 16px;
      transition: color 0.3s ease;
    }
    body.listening #status { color: var(--accent); }
    body.speaking #status  { color: var(--accent); }
    body.thinking #status  { color: var(--warning); }

    /* ── Transcript ────────────────────────────────────────────────── */
    #transcript {
      width: 100%;
      max-width: 480px;
      min-height: 80px;
      max-height: 140px;
      overflow-y: auto;
      margin-bottom: 20px;
      padding: 0 16px;
    }
    .t-line {
      font-size: 14px;
      line-height: 1.5;
      padding: 6px 14px;
      border-radius: 12px;
      margin-bottom: 6px;
      max-width: 85%;
      animation: fadeSlideIn 0.3s ease;
      word-wrap: break-word;
    }
    .t-line.user {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: var(--accent);
      margin-left: auto;
      text-align: right;
    }
    .t-line.ai {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Control button ────────────────────────────────────────────── */
    #btn-voice {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 36px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.25);
    }
    #btn-voice:hover {
      box-shadow: 0 0 50px rgba(34, 197, 94, 0.4);
      transform: scale(1.03);
    }
    #btn-voice.active {
      background: var(--danger);
      box-shadow: 0 0 30px rgba(239, 68, 68, 0.25);
    }
    #btn-voice.active:hover {
      box-shadow: 0 0 50px rgba(239, 68, 68, 0.4);
    }

    /* ── Toast ──────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 10px 24px;
      border-radius: 10px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }
    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Branding ──────────────────────────────────────────────────── */
    #brand {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.5;
    }
    #brand a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── Nina purple theme ─────────────────────────────────────────── */
    body.nina-theme {
      --accent: #a855f7;
      --accent-dim: #9333ea;
      --accent-glow: rgba(168, 85, 247, 0.35);
      --border: rgba(168, 85, 247, 0.18);
    }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media (max-height: 700px) {
      #avatar-container { width: 220px; height: 220px; }
      #avatar-orb { width: 200px; height: 200px; }
      #transcript { min-height: 60px; max-height: 100px; }
    }
    @media (max-width: 400px) {
      .persona-btn { padding: 8px 18px; font-size: 13px; }
      #btn-voice { padding: 12px 28px; font-size: 14px; }
    }
  </style>
</head>
<body class="idle">

<div id="persona-bar">
  <button class="persona-btn active" data-persona="stewart">🌿 Stewart</button>
  <button class="persona-btn" data-persona="nina">💫 Nina</button>
</div>

<div id="app">

  <div id="avatar-container">
    <div id="avatar-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div id="avatar-orb">
      <img id="avatar-img" src="../assets/stewart-hero.png" alt="Stewart" draggable="false" />
    </div>
  </div>

  <div id="status">Tap to Talk</div>

  <div id="transcript"></div>

  <button id="btn-voice" onclick="toggleVoice()">🎤 Start Conversation</button>

</div>

<div id="toast"></div>
<div id="brand">Powered by <a href="https://meetstewart.com">Stewart AI</a></div>

<script type="module">
  // ── Personas ──────────────────────────────────────────────────────
  const PERSONAS = {
    stewart: {
      name: 'Stewart',
      img: '../assets/stewart-hero.png',
      theme: 'stewart-theme',
      agentId: 'agent_2001krn75ntcet3b2wte9nddrq7e',
      welcome: "Hey, I'm Stewart — cannabis AI that knows your business. Tap the mic to talk.",
      voiceId: 'eFOBJClK5irrpIcan4HP',
    },
    nina: {
      name: 'Nina',
      img: '../assets/nina-hero.png',
      theme: 'nina-theme',
      agentId: 'agent_2001krn75ntcet3b2wte9nddrq7e', // same agent for now
      welcome: "Hi! I'm Nina, your AI cannabis assistant. Tap the mic to chat!",
      voiceId: 'cgSgspJ2msm6clMCkdW9',
    },
  };

  // ── State ─────────────────────────────────────────────────────────
  let currentPersona = 'stewart';
  let conversationActive = false;
  let conversation = null;
  let mode = 'idle';
  let recognition = null;
  let useFallback = false;

  // ── DOM refs ──────────────────────────────────────────────────────
  const body = document.body;
  const statusEl = document.getElementById('status');
  const transcriptEl = document.getElementById('transcript');
  const btnVoice = document.getElementById('btn-voice');
  const avatarImg = document.getElementById('avatar-img');
  const toastEl = document.getElementById('toast');

  // ── Mode / state management ───────────────────────────────────────
  function setMode(m) {
    mode = m;
    body.classList.remove('idle', 'listening', 'thinking', 'speaking');
    body.classList.add(m);
    const labels = { idle: 'Ready', listening: 'Listening…', thinking: 'Thinking…', speaking: 'Speaking' };
    statusEl.textContent = labels[m] || m;
  }

  // ── Toast ─────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg, duration = 3500) {
    toastEl.textContent = msg;
    toastEl.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('visible'), duration);
  }

  // ── Transcript ────────────────────────────────────────────────────
  let lines = [];
  function addLine(text, role) {
    if (lines.length >= 4) {
      const oldest = lines.shift();
      if (oldest && oldest.parentNode) oldest.remove();
    }
    const div = document.createElement('div');
    div.className = 't-line ' + role;
    div.textContent = text;
    transcriptEl.appendChild(div);
    lines.push(div);
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
  }

  // ── ElevenLabs Conversational AI ──────────────────────────────────
  async function startElevenLabsConversation() {
    try {
      const { Conversation } = await import('https://cdn.jsdelivr.net/npm/@11labs/client@latest/+esm');

      await navigator.mediaDevices.getUserMedia({ audio: true });

      const persona = PERSONAS[currentPersona];
      conversation = await Conversation.startSession({
        agentId: persona.agentId,
        onConnect: () => {
          console.log('[voice] ElevenLabs connected');
          setMode('idle');
          showToast('Connected — start talking!');
        },
        onDisconnect: () => {
          console.log('[voice] ElevenLabs disconnected');
          setMode('idle');
          conversationActive = false;
          updateButton();
        },
        onModeChange: ({ mode: newMode }) => {
          if (newMode === 'speaking') setMode('speaking');
          else if (newMode === 'listening') setMode('listening');
          else setMode('idle');
        },
        onMessage: ({ message, source }) => {
          addLine(message, source === 'ai' ? 'ai' : 'user');
        },
        onError: (error) => {
          console.warn('[voice] ElevenLabs error:', error);
          showToast('Voice error — retrying…');
        },
      });

      conversationActive = true;
      useFallback = false;
      updateButton();
      setMode('listening');
      return true;
    } catch (err) {
      console.warn('[voice] ElevenLabs SDK unavailable, using fallback:', err.message);
      return false;
    }
  }

  async function stopElevenLabsConversation() {
    if (conversation) {
      try { await conversation.endSession(); } catch (e) {}
      conversation = null;
    }
    conversationActive = false;
    setMode('idle');
    updateButton();
  }

  // ── Fallback: Web Speech API + beast-gateway ──────────────────────
  const GATEWAY = 'https://satisfied-passion-production-84cd.up.railway.app';

  function setupFallbackRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const rec = new SR();
    rec.continuous = false;
    rec.interimResults = false;
    rec.lang = 'en-US';

    rec.onstart = () => setMode('listening');
    rec.onresult = async (e) => {
      const text = e.results[0][0].transcript.trim();
      if (text) {
        addLine(text, 'user');
        await sendToGateway(text);
      } else {
        setMode('idle');
      }
    };
    rec.onerror = (e) => {
      if (e.error !== 'no-speech') showToast('Mic error: ' + e.error);
      setMode('idle');
    };
    rec.onend = () => {
      if (mode === 'listening') setMode('idle');
      // Auto-restart if still active
      if (conversationActive && useFallback) {
        setTimeout(() => {
          if (conversationActive && mode === 'idle') {
            try { rec.start(); } catch(e) {}
          }
        }, 500);
      }
    };
    return rec;
  }

  async function sendToGateway(text) {
    setMode('thinking');
    try {
      const res = await fetch(GATEWAY + '/ingest/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          channel: 'voice-demo',
          userId: 'cannistew-demo-' + currentPersona,
          sessionId: 'demo-' + Date.now(),
        }),
      });
      const data = await res.json();
      const reply = data.response || data.reply || "I'm here — what can I help with?";
      addLine(reply, 'ai');
      setMode('speaking');
      speakWebSpeech(reply, () => setMode('idle'));
    } catch (err) {
      console.warn('[voice] Gateway error:', err);
      const fallback = "I'm having a little trouble, but I'm here. Try again!";
      addLine(fallback, 'ai');
      setMode('speaking');
      speakWebSpeech(fallback, () => setMode('idle'));
    }
  }

  function speakWebSpeech(text, onEnd) {
    const synth = window.speechSynthesis;
    if (!synth) { onEnd && onEnd(); return; }
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.0;
    utter.pitch = 0.95;
    const voices = synth.getVoices();
    const pref = voices.find(v => v.lang.startsWith('en') && v.localService) || voices.find(v => v.lang.startsWith('en'));
    if (pref) utter.voice = pref;
    utter.onend = () => onEnd && onEnd();
    utter.onerror = () => onEnd && onEnd();
    synth.speak(utter);
  }

  async function startFallbackConversation() {
    try {
      await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      showToast('Microphone access needed');
      return;
    }

    useFallback = true;
    conversationActive = true;
    recognition = setupFallbackRecognition();
    if (recognition) {
      try { recognition.start(); } catch(e) {}
    }
    updateButton();
    showToast('Voice active — start talking!');
  }

  function stopFallbackConversation() {
    useFallback = false;
    conversationActive = false;
    if (recognition) {
      try { recognition.abort(); } catch(e) {}
      recognition = null;
    }
    window.speechSynthesis && window.speechSynthesis.cancel();
    setMode('idle');
    updateButton();
  }

  // ── Toggle voice ──────────────────────────────────────────────────
  window.toggleVoice = async function() {
    if (conversationActive) {
      if (useFallback) stopFallbackConversation();
      else await stopElevenLabsConversation();
      return;
    }

    showToast('Connecting…');
    // Try ElevenLabs first
    const ok = await startElevenLabsConversation();
    if (!ok) {
      // Fallback
      showToast('Using browser voice…');
      await startFallbackConversation();
    }
  };

  function updateButton() {
    if (conversationActive) {
      btnVoice.classList.add('active');
      btnVoice.innerHTML = '⏹ End Conversation';
    } else {
      btnVoice.classList.remove('active');
      btnVoice.innerHTML = '🎤 Start Conversation';
      statusEl.textContent = 'Tap to Talk';
    }
  }

  // ── Persona switching ─────────────────────────────────────────────
  document.querySelectorAll('.persona-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const key = btn.dataset.persona;
      if (key === currentPersona) return;

      // Stop current conversation
      if (conversationActive) {
        if (useFallback) stopFallbackConversation();
        else await stopElevenLabsConversation();
      }

      currentPersona = key;
      const persona = PERSONAS[key];

      // Update UI
      avatarImg.style.opacity = '0';
      setTimeout(() => {
        avatarImg.src = persona.img;
        avatarImg.alt = persona.name;
        avatarImg.style.opacity = '1';
      }, 200);

      // Update theme
      body.classList.remove('stewart-theme', 'nina-theme');
      body.classList.add(persona.theme);

      // Update buttons
      document.querySelectorAll('.persona-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.persona === key)
      );

      showToast('Switched to ' + persona.name);
    });
  });

  // ── Keyboard shortcut: Space to toggle ────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      window.toggleVoice();
    }
  });

  // ── Preload images ────────────────────────────────────────────────
  Object.values(PERSONAS).forEach(p => {
    const img = new Image();
    img.src = p.img;
  });
</script>

</body>
</html>
